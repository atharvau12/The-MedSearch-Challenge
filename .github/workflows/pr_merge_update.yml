name: Merge PR Leaderboard Update

on:
  pull_request:
    types: [closed]

jobs:
  update_after_merge:
    # Only run if the PR was actually merged, not just closed
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          # Fetches full history so the bot can push changes back
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r baseline_code/requirements.txt

      - name: Run Hidden Evaluation
        run: |
          # Ensure the outputs directory exists before running the script
          mkdir -p outputs
          python hidden_evaluation/evaluator.py

      - name: Read Score
        id: score_step
        run: |
          # Extract the final_score from the generated JSON
          SCORE=$(python -c "import json; print(json.load(open('outputs/evaluation_result.json'))['final_score'])")
          echo "score=$SCORE" >> $GITHUB_OUTPUT

      - name: Update Leaderboard Files
        run: |
          # Calls the script that handles both .json and .md files
          python -c "from leaderboard.update_leaderboard import update_leaderboard; update_leaderboard('${{ github.event.pull_request.user.login }}', '${{ github.event.pull_request.number }}', ${{ steps.score_step.outputs.score }})"

      - name: Save Participant Submission
        run: |
          # Create a specific folder for the contributor's code
          mkdir -p participant_submissions/${{ github.event.pull_request.user.login }}_PR${{ github.event.pull_request.number }}
          cp baseline_code/recommender.py participant_submissions/${{ github.event.pull_request.user.login }}_PR${{ github.event.pull_request.number }}/

      - name: Commit Updated Files
        run: |
          # Set identity so GitHub knows who is committing
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Stage the leaderboard data and the new submission folder
          git add leaderboard/leaderboard.json leaderboard/leaderboard.md participant_submissions/
          
          # Commit and push. If no changes (rare), the '|| echo' prevents the action from failing.
          git commit -m "🏆 Achievement: ${{ github.event.pull_request.user.login }} joined the leaderboard!" || echo "No changes to commit"
          git push origin main
