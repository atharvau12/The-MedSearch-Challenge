name: Merge PR Leaderboard Update

on:
  pull_request:
    types: [closed]
  workflow_dispatch: # THE EMERGENCY BUTTON

permissions:
  contents: write # CRITICAL: Allows the bot to update your leaderboard and folders

jobs:
  update_after_merge:
    # Runs if merged OR if you click the manual button
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r baseline_code/requirements.txt

      - name: Run Hidden Evaluation
        run: |
          mkdir -p outputs
          python hidden_evaluation/evaluator.py

      - name: Read Score
        id: score_step
        run: |
          SCORE=$(python -c "import json; print(json.load(open('outputs/evaluation_result.json'))['final_score'])")
          echo "score=$SCORE" >> $GITHUB_OUTPUT

      - name: Update Leaderboard Files
        run: |
          # Use 'Manual_Run' as username if triggered by button, otherwise use PR username
          USER_NAME="${{ github.event.pull_request.user.login }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          if [ -z "$USER_NAME" ]; then USER_NAME="Admin_Manual"; PR_NUM="0"; fi
          
          python -c "from leaderboard.update_leaderboard import update_leaderboard; update_leaderboard('$USER_NAME', '$PR_NUM', ${{ steps.score_step.outputs.score }})"

      - name: Save Participant Submission
        run: |
          USER_NAME="${{ github.event.pull_request.user.login }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          if [ -z "$USER_NAME" ]; then USER_NAME="Admin_Manual"; PR_NUM="0"; fi
          
          mkdir -p participant_submissions/${USER_NAME}_PR${PR_NUM}
          cp baseline_code/recommender.py participant_submissions/${USER
