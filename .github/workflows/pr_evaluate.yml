name: PR Auto Evaluation

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: # Allows you to manually trigger this check

permissions:
  contents: read

jobs:
  evaluate_submission:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r baseline_code/requirements.txt

      - name: Run Hidden Evaluation
        run: |
          mkdir -p outputs
          python hidden_evaluation/evaluator.py

      - name: Upload evaluation result
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-result
          path: outputs/evaluation_result.json
